- id: inoue-kanta
  name: 井上 幹太
  name_en: Kanta Inoue
  role: 代表取締役
  role_en: CEO & Founder
  bio: |
    フィンランド・Aalto Universityにてデザイン思考を修め、アルヴァ・アアルトの「自然と文化が調和する個性表現」に影響を受ける。帰国後、京都の職人文化と東京のモダンな審美眼を融合させる事業構想を持ち、Regalis Japan Group株式会社を創業。オーダースーツ事業を起点に、AI/DXコンサルティング・Web制作・学生支援など多角経営を推進。「経営と現場と次世代を、テクノロジーと品格でつなぐ」をグループの基軸に据える。
  bio_short: Aalto大学でデザイン思考を修め帰国後に創業。京都の職人文化と東京のモダン美学を融合させた多角経営を推進。
