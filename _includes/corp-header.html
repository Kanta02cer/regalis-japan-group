<header class="corp-header" id="corp-header">
  <div class="corp-header__inner">
    <!-- ロゴ -->
    <a href="{{ '/group/' | absolute_url }}" class="corp-header__logo">
      <picture>
        <source srcset="{{ '/images/rogo.new_transpalent-Photoroom.webp' | relative_url }}" type="image/webp">
        <img src="{{ '/images/rogo.new_transpalent-Photoroom.png' | relative_url }}" alt="Regalis Japan Group ロゴ">
      </picture>
      <span class="corp-header__logo-label">グループ</span>
    </a>

    <!-- PC ナビゲーション -->
    <nav aria-label="メインナビゲーション">
      <ul class="corp-nav">
        <li><a href="{{ '/about/ceo.html' | relative_url }}">代表について</a></li>
        <li class="corp-nav__has-drop">
          <a href="{{ '/business/' | relative_url }}">3つの事業</a>
          <ul class="corp-nav__drop">
            <li><a href="{{ '/business/praxis/' | relative_url }}"><span class="drop-brand">PRAXIS</span> AI・DXコンサル</a></li>
            <li><a href="{{ '/business/academia/' | relative_url }}"><span class="drop-brand">ACADEMIA</span> 学生機会創出</a></li>
            <li><a href="{{ '/business/oratio/' | relative_url }}"><span class="drop-brand">ORATIO</span> 代表発信・タレント</a></li>
          </ul>
        </li>
        <li><a href="{{ '/about/company.html' | relative_url }}">会社概要</a></li>
        <li><a href="https://regalis-order-suits.com/" class="corp-header__back" target="_blank" rel="noopener">スーツブランド ↗</a></li>
        <li><a href="{{ '/contact/' | relative_url }}" class="corp-nav__cta">無料相談</a></li>
      </ul>
    </nav>

    <!-- ハンバーガー（モバイル） -->
    <button class="corp-hamburger" id="corp-hamburger" aria-label="メニューを開く" aria-expanded="false" aria-controls="corp-mobile-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<!-- モバイルナビ -->
<nav id="corp-mobile-nav" class="corp-mobile-nav" aria-label="モバイルナビゲーション">
  <a href="{{ '/' | relative_url }}">ホーム</a>
  <a href="{{ '/about/ceo.html' | relative_url }}">代表について</a>
  <div class="corp-mobile-nav__group">
    <span class="corp-mobile-nav__label">3つの事業</span>
    <a href="{{ '/business/praxis/' | relative_url }}">AI・DXコンサル（PRAXIS）</a>
    <a href="{{ '/business/academia/' | relative_url }}">学生機会創出（ACADEMIA）</a>
    <a href="{{ '/business/oratio/' | relative_url }}">代表発信・タレント（ORATIO）</a>
  </div>
  <a href="{{ '/about/company.html' | relative_url }}">会社概要</a>
  <a href="{{ '/contact/' | relative_url }}">無料相談</a>
  <a href="https://regalis-order-suits.com/" style="font-size:13px; opacity:0.5;" target="_blank" rel="noopener">スーツブランドへ ↗</a>
</nav>

<script>
(function(){
  var btn = document.getElementById('corp-hamburger');
  var nav = document.getElementById('corp-mobile-nav');
  var header = document.getElementById('corp-header');
  if (!btn || !nav) return;
  btn.addEventListener('click', function(){
    var open = nav.classList.toggle('is-open');
    btn.setAttribute('aria-expanded', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      nav.classList.remove('is-open');
      btn.setAttribute('aria-expanded', false);
      document.body.style.overflow = '';
    });
  });
  window.addEventListener('scroll', function(){
    header.classList.toggle('scrolled', window.scrollY > 40);
  }, { passive: true });
})();
</script>
